<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BesoLux - Shopify - model danych</title>
<style>
:root {
  --bg: #f4efe8;
  --panel: #fffdf8;
  --text: #2f2a22;
  --muted: #7a6f5a;
  --accent: #b35c44;
  --border: #dccfbe;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: Georgia, "Times New Roman", serif;
  color: var(--text);
  background:
    radial-gradient(circle at top left, #f8d9cf 0, transparent 28%),
    linear-gradient(180deg, #f6f0e7 0%, #efe5d8 100%);
}
main {
  max-width: 1440px;
  margin: 0 auto;
  padding: 32px 24px 48px;
}
header {
  margin-bottom: 24px;
}
h1 {
  margin: 0 0 8px;
  font-size: clamp(28px, 4vw, 44px);
  line-height: 1.05;
}
p {
  margin: 0;
  max-width: 860px;
  font-size: 18px;
  line-height: 1.5;
  color: var(--muted);
}
.actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 20px;
}
.actions a {
  display: inline-block;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 999px;
  color: var(--text);
  text-decoration: none;
  background: rgba(255, 253, 248, 0.9);
}
.actions a.primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fffdf8;
}
.figure {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 18px;
  box-shadow: 0 18px 40px rgba(81, 57, 38, 0.08);
  overflow: auto;
}
.figure img {
  display: block;
  width: 100%;
  min-width: 1040px;
  height: auto;
}
@media (max-width: 900px) {
  main { padding: 24px 14px 32px; }
  p { font-size: 16px; }
  .figure { padding: 12px; }
}
</style>
</head>
<body>
<main>
  <header>
    <h1>Shopify - model danych</h1>
    <p>Grafika wygenerowana z diagramu UML, przygotowana do czytelnego podglądu i udostępniania bez kopiowania z edytora.</p>
    <div class="actions">
      <a class="primary" href="shopify-model-danych.svg" target="_blank" rel="noopener noreferrer">Otwórz SVG</a>
      <a href="https://github.com/AgataBednarska/besolux-bc-checklist" target="_blank" rel="noopener noreferrer">Repozytorium GitHub</a>
    </div>
  </header>
  <section class="figure">
    <img src="shopify-model-danych.svg" alt="Diagram klas Shopify - model danych">
  </section>
</main>
</body>
</html>
